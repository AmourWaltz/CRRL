data:
  train_batch_size: 256
  micro_batch_size: 4
  micro_batch_size_per_gpu: 4
  train_files: data/nq_hotpotqa_train/data/gsm8k/train.parquet
  val_files: data/nq_hotpotqa_train/data/gsm8k/test.parquet
  prompt_key: question
  response_key: answer
  prompt_dict_keys: question
  response_dict_keys: gold_answers
  multiturn:
    enable: false
    messages_key: messages
    tools_key: tools
    enable_thinking_key: enable_thinking
  max_length: 1024
  truncation: error
  balance_dp_token: false
  chat_template: null
  custom_cls:
    path: null
    name: null
  use_shm: false
  apply_chat_template_kwargs: {}
model:
  partial_pretrain: Qwen/Qwen2.5-3B
  use_shm: false
  fsdp_config:
    model_dtype: fp32
    wrap_policy:
      min_num_params: 0
    cpu_offload: false
    offload_params: false
  external_lib: null
  enable_gradient_checkpointing: true
  trust_remote_code: false
  lora_rank: 0
  lora_alpha: 16
  target_modules: all-linear
  use_liger: false
  strategy: fsdp2
optim:
  lr: 0.0001
  betas:
  - 0.9
  - 0.95
  weight_decay: 0.01
  warmup_steps_ratio: 0.1
  clip_grad: 1.0
  lr_scheduler: cosine
ulysses_sequence_parallel_size: 1
use_remove_padding: false
trainer:
  default_local_dir: ./checkpoints
  default_hdfs_dir: null
  project_name: CRPO
  experiment_name: nq-hotpotqa-sft-qwen2.5-3b-em
  total_epochs: 3
  total_training_steps: null
  logger: console
  seed: 1
  save_freq: -1
  test_freq: -1
  nnodes: 1
  n_gpus_per_node: 8
  max_ckpt_to_keep: null
  resume_mode: auto
  resume_from_path: null
  checkpoint:
    save_contents:
    - model
    - optimizer
    - extra
    load_contents: ${trainer.checkpoint.save_contents}
  device: cuda
