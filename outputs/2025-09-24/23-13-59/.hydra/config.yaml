data:
  train_batch_size: 256
  micro_batch_size: 16
  train_files: data/nq_hotpotqa_train/data/gsm8k/train.parquet
  val_files: data/nq_hotpotqa_train/data/gsm8k/test.parquet
  prompt_key: prompt
  response_key: answer
  max_length: 1024
  truncation: error
  balance_dp_token: false
  chat_template: null
  prompt_dict_keys: question
  response_dict_keys: gold_answers
  micro_batch_size_per_gpu: 4
model:
  partial_pretrain: Qwen/Qwen2.5-3B
  fsdp_config:
    wrap_policy:
      min_num_params: 0
    cpu_offload: false
    offload_params: false
  external_lib: null
  enable_gradient_checkpointing: false
  trust_remote_code: false
  lora_rank: 0
  lora_alpha: 16
  target_modules:
  - q_proj
  - v_proj
optim:
  lr: 0.0001
  betas:
  - 0.9
  - 0.95
  weight_decay: 0.01
  warmup_steps_ratio: 0.1
  clip_grad: 1.0
trainer:
  default_local_dir: ./checkpoints
  default_hdfs_dir: hdfs://tmp/experiments/gsm8k/gemma-1.1-7b-it/
  resume_path: null
  project_name: CRPO
  experiment_name: nq-hotpotqa-sft-qwen2.5-3b-em
  total_epochs: 3
  total_training_steps: null
  validate_before_training: false
  logger: console
  seed: 1
